name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build api
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/api

      - name: Build worker
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/worker
