services:
  # ─── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dentdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dentdesk
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: dentdesk_db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentdesk -d dentdesk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dentdesk_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dentdesk_backend
    restart: unless-stopped
    env_file:
      - ../.env.example
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dentdesk_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
