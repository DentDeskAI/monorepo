  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dentdesk
      POSTGRES_PASSWORD: dentdesk
      POSTGRES_DB: dentdesk
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dentdesk"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli
