server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — re-resolves upstream IPs after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE — no buffering (must come before the general /api/ block)
    location = /api/events {
        set $upstream http://api:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # API proxy
    location /api/ {
        set $upstream http://api:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # WhatsApp webhook
    location /webhook/ {
        set $upstream http://api:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
    }
}
