basePath: /
definitions:
  github_com_dentdesk_dentdesk_internal_chairs.Chair:
    properties:
      active:
        type: boolean
      clinic_id:
        type: string
      external_id:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  github_com_dentdesk_dentdesk_internal_clinics.Clinic:
    properties:
      created_at:
        type: string
      id:
        type: string
      macdent_base_url:
        type: string
      name:
        type: string
      scheduler_type:
        type: string
      slot_duration_min:
        type: integer
      timezone:
        type: string
      whatsapp_phone_id:
        type: string
      working_hours:
        items:
          type: integer
        type: array
    type: object
  github_com_dentdesk_dentdesk_internal_doctors.Doctor:
    properties:
      active:
        type: boolean
      clinic_id:
        type: string
      external_id:
        type: string
      id:
        type: string
      name:
        type: string
      specialty:
        type: string
    type: object
  github_com_dentdesk_dentdesk_internal_patients.Patient:
    properties:
      clinic_id:
        type: string
      external_id:
        type: string
      id:
        type: string
      language:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  internal_http_handlers.changePasswordReq:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  internal_http_handlers.createAppointmentReq:
    properties:
      chair_id:
        type: string
      doctor_id:
        type: string
      ends_at:
        type: string
      patient_id:
        type: string
      service:
        example: Чистка зубов
        type: string
      starts_at:
        type: string
    required:
    - ends_at
    - patient_id
    - starts_at
    type: object
  internal_http_handlers.createChairReq:
    properties:
      external_id:
        example: CHAIR-01
        type: string
      name:
        example: Кабинет 1
        type: string
    required:
    - name
    type: object
  internal_http_handlers.createDoctorReq:
    properties:
      external_id:
        example: DOC-001
        type: string
      name:
        example: Айгерим Касымова
        type: string
      specialty:
        example: therapist
        type: string
    required:
    - name
    type: object
  internal_http_handlers.createPatientReq:
    properties:
      external_id:
        example: PAT-001
        type: string
      language:
        example: ru
        type: string
      name:
        example: Асем Нурова
        type: string
      phone:
        example: "+77001234567"
        type: string
    required:
    - phone
    type: object
  internal_http_handlers.createUserReq:
    properties:
      email:
        example: operator@clinic.kz
        type: string
      name:
        example: Бауыржан Ахметов
        type: string
      password:
        example: pass1234
        type: string
      role:
        example: operator
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  internal_http_handlers.loginReq:
    properties:
      email:
        example: admin@demo.kz
        type: string
      password:
        example: demo1234
        type: string
    required:
    - email
    - password
    type: object
  internal_http_handlers.registerReq:
    properties:
      clinic_name:
        example: Happy Smile Dental
        type: string
      email:
        example: owner@clinic.kz
        type: string
      owner_name:
        example: Айгерим Касымова
        type: string
      password:
        example: secret1234
        type: string
      timezone:
        example: Asia/Almaty
        type: string
    required:
    - clinic_name
    - email
    - owner_name
    - password
    - timezone
    type: object
  internal_http_handlers.sendMsgReq:
    properties:
      body:
        example: Завтра в 10:00 вам подходит?
        type: string
    required:
    - body
    type: object
  internal_http_handlers.updateChairReq:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  internal_http_handlers.updateClinicReq:
    properties:
      name:
        type: string
      scheduler_type:
        type: string
      slot_duration_min:
        type: integer
      timezone:
        type: string
      working_hours:
        type: string
    required:
    - name
    - timezone
    type: object
  internal_http_handlers.updateDoctorReq:
    properties:
      active:
        type: boolean
      name:
        type: string
      specialty:
        type: string
    required:
    - name
    type: object
  internal_http_handlers.updatePatientReq:
    properties:
      external_id:
        type: string
      language:
        example: ru
        type: string
      name:
        type: string
    type: object
  internal_http_handlers.updateStatusReq:
    properties:
      status:
        example: confirmed
        type: string
    required:
    - status
    type: object
  internal_http_handlers.updateUserReq:
    properties:
      name:
        type: string
      role:
        type: string
    required:
    - name
    - role
    type: object
host: localhost:8082
info:
  contact: {}
  description: Dental CRM — WhatsApp bot + operator workspace.
  title: DentDesk API
  version: "1.0"
paths:
  /api/appointments:
    post:
      consumes:
      - application/json
      description: Manually books an appointment (source=operator).
      parameters:
      - description: Appointment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.createAppointmentReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create appointment
      tags:
      - scheduling
  /api/appointments/{id}:
    get:
      description: Returns a single appointment with patient and doctor info.
      parameters:
      - description: Appointment UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get appointment
      tags:
      - scheduling
  /api/appointments/{id}/status:
    put:
      consumes:
      - application/json
      description: 'Updates appointment status. Allowed values: scheduled, confirmed,
        cancelled, completed, no_show.'
      parameters:
      - description: Appointment UUID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.updateStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update appointment status
      tags:
      - scheduling
  /api/auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's own password.
      parameters:
      - description: Old and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.changePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email + password, returns a signed JWT.
      parameters:
      - description: Credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.loginReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login
      tags:
      - auth
  /api/auth/me:
    get:
      description: Returns the authenticated user's ID, clinic, and role from the
        JWT.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Current user
      tags:
      - auth
  /api/calendar:
    get:
      description: Returns appointments in a date range (RFC3339). Defaults to last
        24h + next 7 days.
      parameters:
      - description: Start time (RFC3339)
        in: query
        name: from
        type: string
      - description: End time (RFC3339)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Calendar
      tags:
      - calendar
  /api/chairs:
    get:
      description: Returns all chairs for the clinic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_chairs.Chair'
            type: array
      security:
      - BearerAuth: []
      summary: List chairs
      tags:
      - chairs
    post:
      consumes:
      - application/json
      description: Adds a new chair/cabinet to the clinic. Requires owner or admin.
      parameters:
      - description: Chair data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.createChairReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_chairs.Chair'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create chair
      tags:
      - chairs
  /api/chairs/{id}:
    delete:
      description: Soft-deletes a chair. Requires owner or admin.
      parameters:
      - description: Chair UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deactivate chair
      tags:
      - chairs
    put:
      consumes:
      - application/json
      description: Updates a chair's name. Requires owner or admin.
      parameters:
      - description: Chair UUID
        in: path
        name: id
        required: true
        type: string
      - description: Chair name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.updateChairReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update chair
      tags:
      - chairs
  /api/chats:
    get:
      description: Returns the 100 most recent conversations for the clinic, enriched
        with patient info and last message.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List chats
      tags:
      - chats
  /api/chats/{id}:
    get:
      description: Returns a single conversation by ID.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get conversation
      tags:
      - chats
  /api/chats/{id}/close:
    post:
      description: Sets conversation status to closed. Bot will no longer respond.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Close conversation
      tags:
      - chats
  /api/chats/{id}/messages:
    get:
      description: Returns up to 200 messages for a conversation in chronological
        order.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List messages
      tags:
      - chats
  /api/chats/{id}/release:
    post:
      description: Sets conversation status back to active so the bot resumes handling
        it.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Release handoff
      tags:
      - chats
  /api/chats/{id}/send:
    post:
      consumes:
      - application/json
      description: Sends a message from the operator to the patient via WhatsApp and
        sets conversation to handoff.
      parameters:
      - description: Conversation UUID
        in: path
        name: id
        required: true
        type: string
      - description: Message body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.sendMsgReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send operator message
      tags:
      - chats
  /api/clinic:
    get:
      description: Returns the current clinic's settings.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_clinics.Clinic'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get clinic
      tags:
      - clinic
    put:
      consumes:
      - application/json
      description: Updates clinic settings. Requires owner or admin role.
      parameters:
      - description: Clinic fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.updateClinicReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_clinics.Clinic'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update clinic
      tags:
      - clinic
  /api/doctors:
    get:
      description: Returns all active doctors for the clinic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List doctors
      tags:
      - doctors
    post:
      consumes:
      - application/json
      description: Adds a new doctor to the clinic. Requires owner or admin.
      parameters:
      - description: Doctor data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.createDoctorReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_doctors.Doctor'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create doctor
      tags:
      - doctors
  /api/doctors/{id}:
    delete:
      description: Soft-deletes a doctor (sets active=false). Requires owner or admin.
      parameters:
      - description: Doctor UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deactivate doctor
      tags:
      - doctors
    get:
      description: Returns a single doctor by ID.
      parameters:
      - description: Doctor UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_doctors.Doctor'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get doctor
      tags:
      - doctors
    put:
      consumes:
      - application/json
      description: Updates a doctor's name, specialty, and active status. Requires
        owner or admin.
      parameters:
      - description: Doctor UUID
        in: path
        name: id
        required: true
        type: string
      - description: Doctor fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.updateDoctorReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update doctor
      tags:
      - doctors
  /api/events:
    get:
      description: Server-Sent Events stream for live updates (new messages, appointments).
        Pass JWT via ?token= query param.
      parameters:
      - description: JWT token
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Real-time event stream
      tags:
      - realtime
  /api/patients:
    get:
      description: Returns up to 200 patients for the clinic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List patients
      tags:
      - patients
    post:
      consumes:
      - application/json
      description: Manually creates a patient record for the clinic.
      parameters:
      - description: Patient data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_http_handlers.createPatientReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_patients.Patient'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create patient
      tags:
      - patients
  /api/patients/{id}:
    get:
      description: Returns a single patient by ID.
      parameters:
      - description: Patient UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_dentdesk_dentdesk_internal_patients.Patient'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get patient
      tags:
      - patients
    put:
      consumes:
      - application/json
      description: Updates a patient's name, language, and external ID.
      parameters:
