  /webhook/whatsapp:
    get:
      description: Meta calls this to verify the webhook endpoint. Returns hub.challenge
        on success.
      parameters:
      - description: Must be 'subscribe'
        in: query
        name: hub.mode
        required: true
        type: string
      - description: Secret token configured in Meta dashboard
        in: query
        name: hub.verify_token
        required: true
        type: string
      - description: Challenge string to echo back
        in: query
        name: hub.challenge
        required: true
        type: string
      responses:
        "200":
          description: challenge
          schema:
            type: string
        "403":
          description: Forbidden
      summary: WhatsApp webhook verification
      tags:
      - webhook
    post:
      consumes:
      - application/json
      description: Receives incoming messages from Meta and triggers bot orchestration
        asynchronously.
      responses:
        "200":
          description: OK
      summary: WhatsApp incoming message
      tags:
      - webhook
securityDefinitions:
  BearerAuth:
    description: 'Format: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
